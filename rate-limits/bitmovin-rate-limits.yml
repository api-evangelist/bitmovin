specificationVersion: "0.1"
name: Bitmovin API Rate Limits
description: >-
  Bitmovin enforces per-access-token rate limits on all Encoding API endpoints.
  Limits are applied uniformly across all plan tiers; no tier-based structure
  exists. When a limit is exceeded the API returns HTTP 429 Too Many Requests.
  Three response headers expose the current window state.
url: https://developer.bitmovin.com/encoding/reference/introduction-of-api-rate-limits
authentication:
  type: API Key
  header: X-Api-Key
  tenantOverride: X-Tenant-Org-Id
responseHeaders:
  - name: x-ratelimit-limit
    description: Maximum requests allowed in the current time window
  - name: x-ratelimit-remaining
    description: Requests remaining before enforcement triggers
  - name: x-ratelimit-reset
    description: Seconds until the current window resets
errorResponse:
  httpStatus: 429
  message: Too Many Requests
  recommendation: >-
    Pause all requests, wait until the x-ratelimit-reset window expires
    (up to 60 seconds), then resume.
endpoints:
  - path: /v1/encoding/encodings
    methods:
      - method: POST
        limitPerMinute: 600
      - method: GET
        limitPerMinute: 60
  - path: /v1/encoding/encodings/{id}/start
    methods:
      - method: POST
        limitPerMinute: 600
      - method: GET
        limitPerMinute: 600
  - path: /v1/encoding/simple
    methods:
      - method: POST
        limitPerMinute: 600
      - method: GET
        limitPerMinute: 600
  - path: /v1/encoding/encodings/{id}/status
    methods:
      - method: GET
        limitPerMinute: 6000
  - path: /v1/encoding/encodings/{id}/ (sub-resources)
    methods:
      - method: POST
        limitPerMinute: 20000
      - method: GET
        limitPerMinute: 20000
  - path: /v1/encoding/inputs
    methods:
      - method: POST
        limitPerMinute: 1000
      - method: GET
        limitPerMinute: 4000
  - path: /v1/encoding/outputs
    methods:
      - method: POST
        limitPerMinute: 1000
      - method: GET
        limitPerMinute: 4000
  - path: /v1/encoding/configurations
    methods:
      - method: POST
        limitPerMinute: 1000
      - method: GET
        limitPerMinute: 4000
  - path: /v1/encoding/filters
    methods:
      - method: POST
        limitPerMinute: 1000
      - method: GET
        limitPerMinute: 4000
  - path: /v1/encoding/manifests
    methods:
      - method: POST
        limitPerMinute: 10000
      - method: GET
        limitPerMinute: 10000
  - path: /v1/encoding/statistics
    methods:
      - method: GET
        limitPerMinute: 60
  - path: /v1/encoding/account
    methods:
      - method: POST
        limitPerMinute: 600
      - method: GET
        limitPerMinute: 600
  - path: /v1/account/login
    methods:
      - method: POST
        limitPerMinute: 10
  - path: /v1/account/initiate-password-reset
    methods:
      - method: POST
        limitPerMinute: 3
accountLevelQuotas:
  description: >-
    Beyond per-minute rate limits, Bitmovin enforces account-level encoding
    quotas. Exceeding these returns specific error codes.
  errorCodes:
    - code: 8001
      meaning: Monthly encoding minutes limit exceeded
    - code: 8002
      meaning: Total bytes encoded limit exceeded
    - code: 8003
      meaning: Queued VOD encoding job limit exceeded
    - code: 8004
      meaning: Concurrent live encoding session limit exceeded
    - code: 8005
      meaning: Additional account-level quota error
    - code: 8006
      meaning: Additional account-level quota error
    - code: 8007
      meaning: Additional account-level quota error
