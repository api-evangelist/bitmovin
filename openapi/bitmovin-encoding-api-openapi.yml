      - DASH
      - HLS
      - CMAF
      default: DASH
    AkamaiMslVersion:
      title: AkamaiMslVersion
      type: string
      enum:
      - MSL4
      default: MSL4
    AkamaiMslOutput:
      title: AkamaiMslOutput
