            example: path/to/file.ismv
          language:
            type: string
            description: Language of the MP4 file
            example: en
          trackName:
            type: string
            description: Track where this MP4 shoudl be added
            example: track_en
          priority:
            type: integer
            description: Specifies the priority of this representation. In the manifest,
