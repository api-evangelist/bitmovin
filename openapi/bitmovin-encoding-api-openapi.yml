            readOnly: true
          modifiedAt:
            type: string
            format: date-time
            description: 'Modified timestamp, returned as UTC expressed in ISO 8601
              format: YYYY-MM-DDThh:mm:ssZ'
            example: '2016-06-25T20:09:23.69Z'
            readOnly: true
    SmoothManifestContentProtection:
