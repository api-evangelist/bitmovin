      - name: AKAMAI_NETSTORAGE
      - name: AZURE
      - name: GENERIC_S3
      - name: GCS
      - name: FTP
      - name: LOCAL
      - name: S3
      - name: S3_ROLE_BASED
      - name: SFTP
      - name: AKAMAI_MSL
      - name: LIVE_MEDIA_INGEST
      - name: GCS_SERVICE_ACCOUNT
      - name: CDN
    LiveMediaIngestOutput:
      title: LiveMediaIngestOutput
