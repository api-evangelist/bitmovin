          type: array
          items:
            $ref: '#/components/schemas/AudioGroup'
          description: Audio groups
          example:
          - name: audio1
            priority: 50
    AudioGroup:
      title: AudioGroup
      required:
      - name
      - priority
      properties:
        name:
          type: string
          description: Name of the audio group
          example: audio1
        priority:
          type: integer
          minimum: 0
          maximum: 100
          description: Priority of the audio group
          example: 50
    DashISO8601TimestampFormat:
      title: DashISO8601TimestampFormat
      type: string
      enum:
      - LONG
      - SHORT
      example: LONG
      default: LONG
      x-enum-elements:
      - name: LONG
        description: Format for generating timestamps in PXXYXXMXXDTXXHXXMX.XXXS
      - name: SHORT
        description: Format for generating timestamps in PTXXHXXMX.XXXS
    ResponseStatus:
      title: ResponseStatus
      type: string
      enum:
      - SUCCESS
      - ERROR
    ManifestGenerator:
      title: ManifestGenerator
      type: string
      default: LEGACY
      enum:
      - LEGACY
      - V2
      x-enum-elements:
      - name: LEGACY
        description: Legacy manifest generator.
      - name: V2
        description: Improved manifest generator which covers all manifest features available in our API.
    BitmovinResource:
      title: BitmovinResource
      allOf:
      - $ref: '#/components/schemas/BitmovinResponse'
      - properties:
          name:
            type: string
            description: Name of the resource. Can be freely chosen by the user.
            example: Name of the resource
          description:
            type: string
            description: Description of the resource. Can be freely chosen by the user.
            example: Description of the resource
          createdAt:
            type: string
            format: date-time
            readOnly: true
            description: 'Creation timestamp, returned as UTC expressed in ISO 8601 format: YYYY-MM-DDThh:mm:ssZ'
            example: '2016-06-25T20:09:23.69Z'
          modifiedAt:
            type: string
            format: date-time
            readOnly: true
            description: 'Modified timestamp, returned as UTC expressed in ISO 8601 format: YYYY-MM-DDThh:mm:ssZ'
            example: '2016-06-25T20:09:23.69Z'
          customData:
            type: string
            writeOnly: true
            description: User-specific meta data. This can hold anything.
            additionalProperties:
              type: object
    VttMediaInfo:
      title: VttMediaInfo
      required:
      - vttUrl
      - uri
      allOf:
      - $ref: '#/components/schemas/BasicMediaInfo'
      - properties:
          vttUrl:
            type: string
            description: The URL of the referenced VTT file
            example: https://yourhost.com/path/mysubtitles.vtt
          uri:
            type: string
            description: The URI of the Rendition
            example: mysubtitles.m3u8
          forced:
            type: boolean
            description: A value of true indicates that the Rendition contains content which is considered essential to play.
            example: false
    Accessibility:
      title: Accessibility
      required:
      - value
      - schemeIdUri
      properties:
        value:
          type: string
          description: Can be either list of languages or a complete map of services (or CC channels, in CEA-608 terminology)
          example: CC1=eng
        schemeIdUri:
          type: string
          description: The scheme id to use. Please refer to the DASH standard.
          example: urn:scte:dash:cc:cea-608:2015
    BasicMediaInfo:
      title: BasicMediaInfo
      required:
      - groupId
      - name
      allOf:
      - $ref: '#/components/schemas/BitmovinResponse'
      - properties:
          groupId:
            type: string
            description: The value is a quoted-string which specifies the group to which the Rendition belongs.
            example: audio_group
          language:
            type: string
            description: Primary language in the rendition.
            example: en
          assocLanguage:
            type: string
            description: Identifies a language that is associated with the Rendition.
            example: de
          name:
            type: string
            description: Human readable description of the rendition.
            example: Rendition description
          isDefault:
            type: boolean
            description: If set to true, the client SHOULD play this Rendition of the content in the absence of information from the user.
            example: false
          autoselect:
            type: boolean
            description: If set to true, the client MAY choose to play this Rendition in the absence of explicit user preference.
            example: false
          characteristics:
            type: array
            items:
              type: string
            description: Contains Uniform Type Identifiers
            example:
            - public.accessibility.describes-video
    DashSegmentedRepresentation:
      title: DashSegmentedRepresentation
      required:
      - type
      - segmentPath
      allOf:
      - $ref: '#/components/schemas/DashMuxingRepresentation'
      - properties:
          type:
            description: ''
            allOf:
            - $ref: '#/components/schemas/DashRepresentationType'
          mode:
            description: ''
            allOf:
            - $ref: '#/components/schemas/DashRepresentationTypeMode'
          segmentPath:
            type: string
            description: Path to segments. Will be used as the representation id if the type is set to TEMPLATE_ADAPTATION_SET
            example: path/to/segments
          startSegmentNumber:
            type: integer
            format: int64
            description: Number of the first segment
            example: 0
          endSegmentNumber:
            type: integer
            format: int64
            description: Number of the last segment. Default is the last one that was encoded
            example: 1701
          startKeyframeId:
            type: string
            description: Id of the keyframe to start with. It takes precedence over startSegmentNumber
            example: ea49cfbe-777e-4a4c-a485-a1578154ff49
          endKeyframeId:
            type: string
            description: Id of the keyframe to end with. It takes precedence over endSegmentNumber. The segment containing the end keyframe is not included in the representation.
            example: 2a49cfbe-777e-4a4c-a485-a1578154ff42
    DashProfile:
      title: DashProfile
      type: string
      enum:
      - LIVE
      - ON_DEMAND
      example: ON_DEMAND
      default: LIVE
      x-enum-elements:
      - name: LIVE
        description: Profile that supports segmented representations/muxings (FMP4, CMAF, WEBM, CHUNKED_TEXT)
      - name: ON_DEMAND
        description: Profile that supports progressive representations/muxings (MP4, PROGRESSIVE_WEBM)
    AudioAdaptationSet:
      title: AudioAdaptationSet
      required:
      - lang
      allOf:
      - $ref: '#/components/schemas/AdaptationSet'
      - properties:
          lang:
            type: string
            description: ISO 639-1 (Alpha-2) code identifying the language of the audio adaptation set
            example: en
    HlsManifest:
      title: HlsManifest
      allOf:
      - $ref: '#/components/schemas/Manifest'
      - properties:
          manifestName:
            type: string
            description: The filename of your manifest. If this is not set, the `name` is used as output file name. Either one of `name` or `manifestName` is required. Be aware that spaces will be replaced with underlines (`_`) on the output.
            example: stream.m3u8
          hlsMediaPlaylistVersion:
            description: If this is set, the EXT-X-VERSION tags of the Media Playlists are set to the provided version
            allOf:
            - $ref: '#/components/schemas/HlsVersion'
          hlsMasterPlaylistVersion:
            description: If this is set, the EXT-X-VERSION tag of the Master Playlist is set to the provided version
            allOf:
            - $ref: '#/components/schemas/HlsVersion'
          channelsAttributeForAudio:
            description: Controls the behaviour of the CHANNELS attribute for the EXT-X-VERSION tag
            allOf:
            - $ref: '#/components/schemas/ChannelsAttributeForAudio'
          targetDurationRoundingMode:
            description: 'The rounding applied to target duration.

              Two possible rouding modes exist: NORMAL_ROUNDING, when the target duration is rounded to the nearest integer,

              or UPWARDS_ROUNDING, when the target duration is rounded to the highest integer.

              '
            allOf:
            - $ref: '#/components/schemas/HlsTargetDurationRoundingMode'
    DashManifest:
      title: DashManifest
      allOf:
      - $ref: '#/components/schemas/Manifest'
      - properties:
          profile:
            description: Determines if segmented or progressive representations can appear in the manifest
            allOf:
            - $ref: '#/components/schemas/DashProfile'
          manifestName:
            type: string
            description: The filename of your manifest
            example: stream.mpd
          namespaces:
            type: array
            description: List of additional XML namespaces to add to the DASH Manifest
            items:
              $ref: '#/components/schemas/XmlNamespace'
          utcTimings:
            type: array
            description: List of UTC Timings to use for live streaming
            items:
              $ref: '#/components/schemas/UtcTiming'
          dashEditionCompatibility:
            description: The manifest compatibility with the standard DASH Edition.
            allOf:
            - $ref: '#/components/schemas/DashEditionCompatibility'
          iso8601TimestampFormat:
            description: Determines how timestamps should appear in the manifest
            allOf:
            - $ref: '#/components/schemas/DashISO8601TimestampFormat'
          minBufferTime:
            type: number
            format: double
            description: 'The minimum buffer time in seconds that the client should maintain to ensure uninterrupted playback. Default is 2 seconds.

              Note: For VOD ON_DEMAND dash manifests, the default value may differ from 2.0 seconds if not explicitly set.

              '
            default: 2
            example: 2
    DashManifestDefault:
      title: DashManifestDefault
      allOf:
      - $ref: '#/components/schemas/DashManifest'
      - properties:
          encodingId:
            description: The id of the encoding to create a default manifest for. Either "encodingId" or "periods" is required.
            type: string
            example: 45ef21d2-1f62-4004-9166-6d5e248270f6
          version:
            description: Specifies the algorithm that determines which output of the given encoding is included into the manifest. Note that this is not related to the "manifestGenerator" version of the "Start" request.
            allOf:
            - $ref: '#/components/schemas/DashManifestDefaultVersion'
          periods:
            description: Adds a period for every item. Can only be used when setting "version" to "V2". Either "periods" or "encodingId" is required.
            type: array
            items:
              $ref: '#/components/schemas/DefaultDashManifestPeriod'
    HlsVersion:
      title: HlsVersion
      type: string
      enum:
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      example: 7
      x-enum-elements:
      - name: HLS_V3
        description: HLS version 3
      - name: HLS_V4
        description: HLS version 4
      - name: HLS_V5
        description: HLS version 5
      - name: HLS_V6
        description: HLS version 6
      - name: HLS_V7
        description: HLS version 7
      - name: HLS_V8
        description: HLS version 8
    SmoothManifestContentProtection:
      title: SmoothManifestContentProtection
      required:
      - encodingId
      - muxingId
      - drmId
      allOf:
      - $ref: '#/components/schemas/BitmovinResource'
      - properties:
          encodingId:
            type: string
            description: Id of the encoding.
            example: cb90b80c-8867-4e3b-8479-174aa2843f62
          muxingId:
            type: string
            description: Id of the muxing.
            example: eabce724-ff1c-41c7-b6e0-34b32e2e37b6
          drmId:
            type: string
            description: Id of the drm.
            example: c8f7aeb8-35f6-49d7-afb9-4820d6f910f1
    DashMp4DrmRepresentation:
      title: DashMp4DrmRepresentation
      required:
      - drmId
      allOf:
      - $ref: '#/components/schemas/DashMp4Representation'
      - properties:
          drmId:
            type: string
            description: DRM Id
            example: 826949d5-0877-46cc-9daf-d75903682f27
    MessageType:
      title: MessageType
      type: string
      enum:
      - ERROR
      - WARNING
      - INFO
      - DEBUG
      - TRACE
    Label:
      title: Label
      required:
      - value
      properties:
        id:
          type: integer
          format: int64
          minimum: 0
          description: Identifier of the label.
        lang:
          type: string
          description: Specifies the language of the label.
        value:
          type: string
          description: Content of the label.
    CustomAttribute:
      title: CustomAttribute
      required:
      - key
      properties:
        key:
          type: string
          description: unique string identifier for the custom attribute
          example: key name
        value:
          type: string
          description: value of the custom attribute
          example: value
    DashRepresentationType:
      title: DashRepresentationType
      type: string
      enum:
      - TEMPLATE
      - LIST
      - TIMELINE
      example: TEMPLATE
      x-enum-elements:
      - name: TEMPLATE
        description: Generates a SegmentTemplate which will be positioned under the representation
      - name: LIST
        description: Generates a SegmentList based representation
      - name: TIMELINE
        description: Generates a SegmentTimeline based representation
    DashMp4Representation:
      title: DashMp4Representation
      required:
      - filePath
      allOf:
      - $ref: '#/components/schemas/DashMuxingRepresentation'
      - properties:
          filePath:
            type: string
            description: Path to the MP4 file
            example: path/to/mp4
          type:
            type: string
            description: The type of the dash representation
            allOf:
            - $ref: '#/components/schemas/DashOnDemandRepresentationType'
            default: SEGMENT_BASE
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      description: Your Bitmovin API key
      name: X-Api-Key
      in: header
    TenantOrgId:
      type: apiKey
      description: Your Bitmovin account organization
      name: X-Tenant-Org-Id
      in: header
