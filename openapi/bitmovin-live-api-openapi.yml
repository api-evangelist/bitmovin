      type: string
      enum:
      - RESERVED
      - TEMPORARY
      example: RESERVED
      x-enum-elements:
      - name: RESERVED
        description: Stream key is persistent and can be reused. It can be assigned to a live encoding when it is currently not in use
      - name: TEMPORARY
        description: Stream key is automatically generated for a live encoding. They can not be reused. After the encoding is finished, the stream key will be gone also
    RtmpIngestPoint:
      title: RtmpIngestPoint
      required:
      - applicationName
