        applicationName:
          type: string
          description: The name of the application where the ingest is streamed to. This has to be unique for each ingest point
          example: live
        streamKey:
          type: string
          description: The stream key for the backup input
          example: myStream
    StreamsAdConfigAd:
      title: StreamsAdConfigAd
      required:
